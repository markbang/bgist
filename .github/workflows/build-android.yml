name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Verify tag matches version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi
          echo "Version match: v$PACKAGE_VERSION"

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bgist-apk
          path: android/app/build/outputs/apk/release/BGist-*.apk
          retention-days: 7

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        id: create_release
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "BGist v${{ steps.version.outputs.version }}"
          body: |
            🚧 Building changelog...
          files: android/app/build/outputs/apk/release/BGist-v*.apk
          draft: true
          prerelease: false

      - name: Generate Changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx changelogithub \
            --token $GITHUB_TOKEN \
            --github ${{ github.repository }} \
            --from $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "") \
            --to v${{ steps.version.outputs.version }} \
            --output /tmp/changelog.md

      - name: Update Release Body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGELOG=$(cat /tmp/changelog.md)
          DOWNLOAD_TABLE="## 📦 Download

          | File | Size | Note |
          |------|------|------|
          | \`BGist-v${{ steps.version.outputs.version }}.apk\` | ~20 MB | Android Release |

          > 当前使用 debug 签名，正式发布需替换为正式签名密钥
          "
          BODY="${DOWNLOAD_TABLE}

          ${CHANGELOG}"
          
          gh release edit v${{ steps.version.outputs.version }} \
            --notes "$BODY" \
            --draft=false
