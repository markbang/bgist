name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Prepare optional release signing
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/bgist-release.keystore
            chmod 600 android/app/bgist-release.keystore

            KEYSTORE_TYPE=$(keytool -list \
              -keystore android/app/bgist-release.keystore \
              -storepass "$ANDROID_KEYSTORE_PASSWORD" 2>/dev/null \
              | sed -n 's/^Keystore type: //p' \
              | head -n1)
            EFFECTIVE_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"
            if [ "$KEYSTORE_TYPE" = "PKCS12" ]; then
              EFFECTIVE_KEY_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
              echo "Detected PKCS12 release keystore; using store password as the effective key password."
            fi

            printf '%s\n' \
              'storeFile=app/bgist-release.keystore' \
              "storePassword=$ANDROID_KEYSTORE_PASSWORD" \
              "keyAlias=$ANDROID_KEY_ALIAS" \
              "keyPassword=$EFFECTIVE_KEY_PASSWORD" \
              > android/keystore.properties
            chmod 600 android/keystore.properties
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release signing configuration
        if: steps.signing.outputs.signed == 'true'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="android/app/bgist-release.keystore"
          CHECK_FILE="/tmp/bgist-signing-check.csr"
          EFFECTIVE_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"

          if ! keytool -list \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            >/tmp/bgist-keystore-store.log 2>&1; then
            echo "::error::Invalid Android release keystore or store password. Check ANDROID_KEYSTORE_BASE64 and ANDROID_KEYSTORE_PASSWORD."
            sed -n '1,20p' /tmp/bgist-keystore-store.log
            exit 1
          fi

          KEYSTORE_TYPE=$(sed -n 's/^Keystore type: //p' /tmp/bgist-keystore-store.log | head -n1)
          if [ "$KEYSTORE_TYPE" = "PKCS12" ]; then
            EFFECTIVE_KEY_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
          fi

          if ! keytool -list \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" \
            >/tmp/bgist-keystore-alias.log 2>&1; then
            echo "::error::Android release keystore alias was not found. Check ANDROID_KEY_ALIAS."
            sed -n '1,20p' /tmp/bgist-keystore-alias.log
            exit 1
          fi

          rm -f "$CHECK_FILE"
          if ! keytool -certreq \
            -alias "$ANDROID_KEY_ALIAS" \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$EFFECTIVE_KEY_PASSWORD" \
            -file "$CHECK_FILE" \
            >/tmp/bgist-keystore-key.log 2>&1; then
            echo "::error::Android release key password does not match the configured alias. Check ANDROID_KEY_PASSWORD and ANDROID_KEY_ALIAS."
            sed -n '1,20p' /tmp/bgist-keystore-key.log
            exit 1
          fi

          rm -f "$CHECK_FILE"
          echo "Release signing validation passed for alias $ANDROID_KEY_ALIAS"

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Verify tag matches version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi
          echo "Version match: v$PACKAGE_VERSION"

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: List APK files
        run: ls -lh android/app/build/outputs/apk/release/BGist-*.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bgist-apk
          path: android/app/build/outputs/apk/release/BGist-*.apk
          retention-days: 7

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        id: create_release
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: 'BGist v${{ steps.version.outputs.version }}'
          body: |
            🚧 Building changelog...
          files: android/app/build/outputs/apk/release/BGist-v*.apk
          draft: true
          prerelease: false

      - name: Generate Changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            npx changelogithub \
              --token $GITHUB_TOKEN \
              --github ${{ github.repository }} \
              --to v${{ steps.version.outputs.version }} \
              --output /tmp/changelog.md
          else
            npx changelogithub \
              --token $GITHUB_TOKEN \
              --github ${{ github.repository }} \
              --from $PREV_TAG \
              --to v${{ steps.version.outputs.version }} \
              --output /tmp/changelog.md
          fi

      - name: Generate Download Table
        id: download_table
        run: |
          echo '## 📦 Download' > /tmp/download.md
          echo '' >> /tmp/download.md
          echo '| File | Architecture | Size | Note |' >> /tmp/download.md
          echo '|------|-------------|------|------|' >> /tmp/download.md
          for apk in android/app/build/outputs/apk/release/BGist-*.apk; do
            filename=$(basename "$apk")
            size=$(du -h "$apk" | cut -f1)
            if echo "$filename" | grep -q "arm64-v8a"; then
              arch="arm64-v8a (Modern devices)"
            elif echo "$filename" | grep -q "armeabi-v7a"; then
              arch="armeabi-v7a (Older devices)"
            else
              arch="Universal (All devices)"
            fi
            echo "| \`$filename\` | $arch | $size | Download |" >> /tmp/download.md
          done
          echo '' >> /tmp/download.md
          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            echo '> Release signing: built with the configured Android release keystore.' >> /tmp/download.md
          else
            echo '> Release signing: no CI signing secrets configured, so these APKs use the fallback debug key and are intended for testing only.' >> /tmp/download.md
          fi
          echo '> ' >> /tmp/download.md
          echo '> Download tip: start with `arm64-v8a` on most modern Android phones, and use `universal` only if needed.' >> /tmp/download.md

      - name: Update Release Body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGELOG=$(cat /tmp/changelog.md)
          DOWNLOAD_TABLE=$(cat /tmp/download.md)

          BODY="${DOWNLOAD_TABLE}

          ---

          ${CHANGELOG}"

          gh release edit v${{ steps.version.outputs.version }} \
            --notes "$BODY" \
            --draft=false
